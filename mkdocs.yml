site_name: OC Wiki — 知识共享平台
site_url: https://shazhou-ww.github.io/oc-wiki/
site_description: NEKO & KUMA 小队的共享知识库
site_author: shazhou-ww
repo_name: shazhou-ww/oc-wiki
repo_url: https://github.com/shazhou-ww/oc-wiki

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - NEKO 小队:
      - 概览: neko/index.md
  - KUMA 小队:
      - 概览: kuma/index.md
  - 共享知识:
      - 概览: shared/index.md
      - 语音转文字配置: shared/speech-to-text.md
      - SiliconFlow 图片生成: shared/siliconflow-image-gen.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shazhou-ww
